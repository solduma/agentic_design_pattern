    />
    <meta
      name="description"
      content="분석 Agent의 파이프라인·에이전트·시스템 아키텍처 문서를 한곳에서 탭으로 봅니다."
    />
    <style>
      /* Palette mirrors the three docs (their shared :root). The shell is a thin
         chrome around each document — every doc is loaded in its own iframe so
         their identical CSS classes and duplicate element ids never collide. */
      :root {
        --bg: #f7f7fb;
        --card: #ffffff;
        --fg: #1a1a24;
        --muted: #6b6b85;
        --primary: #5257e6;
        --border: rgba(20, 20, 40, 0.1);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--fg);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
          "Noto Sans KR", Inter, sans-serif;
      }
      header.shell {
        flex: 0 0 auto;
        background: var(--card);
        border-bottom: 1px solid var(--border);
        padding: 14px 20px 0;
      }
      .brand {
        display: flex;
        align-items: baseline;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .brand h1 {
        font-size: 17px;
        letter-spacing: -0.01em;
        margin: 0;
      }
      .brand .sub {
        color: var(--muted);
        font-size: 12.5px;
      }
      /* Tab row */
      .tabs {
        display: flex;
        gap: 4px;
        overflow-x: auto;
      }
      .tab {
        appearance: none;
        border: 1px solid transparent;
        border-bottom: none;
        background: none;
        color: var(--muted);
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 16px 11px;
        border-radius: 10px 10px 0 0;
        cursor: pointer;
        white-space: nowrap;
        display: flex;
        flex-direction: column;
        gap: 2px;
        line-height: 1.35;
        transition:
          color 0.12s ease,
          background 0.12s ease;
      }
      .tab .t-sub {
        font-size: 11px;
        font-weight: 500;
        opacity: 0.75;
      }
      .tab:hover {
        color: var(--fg);
        background: var(--bg);
      }
      .tab[aria-selected="true"] {
        color: var(--primary);
        background: var(--bg);
        border-color: var(--border);
        margin-bottom: -1px;
      }
      .tab:focus-visible {
        outline: 2px solid var(--primary);
        outline-offset: -2px;
      }
      /* Iframe stage fills the rest of the viewport; each doc scrolls itself. */
      main.stage {
        flex: 1 1 auto;
        position: relative;
        min-height: 0;
      }
      main.stage iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        background: var(--bg);
      }
      main.stage iframe[hidden] {
        display: none;
      }
      noscript .fallback {
        display: block;
        padding: 18px 20px;
        font-size: 14px;
      }
      noscript .fallback a {
        color: var(--primary);
      }
    </style>
  </head>
  <body>
    <header class="shell">
      <div class="brand">
        <h1>분석 Agent — 아키텍처 문서</h1>
        <span class="sub">파이프라인 · 에이전트 · 시스템 아키텍처</span>
      </div>
      <div class="tabs" role="tablist" aria-label="문서 탭"></div>
    </header>

    <main class="stage"></main>

    <noscript>
      <div class="fallback">
        JavaScript가 꺼져 있어 탭을 표시할 수 없습니다. 문서를 직접 여세요:
        <a href="pipelines.html">파이프라인</a> ·
        <a href="agent-architecture.html">에이전트 아키텍처</a> ·
        <a href="system-architecture.html">시스템 아키텍처</a>
      </div>
    </noscript>

    <script>
      // Single source of truth for the tabs. `hash` deep-links a tab and
      // survives reload; iframes lazy-load on first activation, then stay
      // mounted so switching is instant and scroll position is preserved.
      const TABS = [
        {
          hash: "pipelines",
          file: "pipelines.html",
          label: "파이프라인",
          sub: "인덱싱 · 검색 · 자가 개선",
        },
        {
          hash: "agent",
          file: "agent-architecture.html",
          label: "에이전트 아키텍처",
          sub: "마스터 · 전문 에이전트",
        },
        {
          hash: "system",
          file: "system-architecture.html",
          label: "시스템 아키텍처",
          sub: "육각형 · 인프라",
        },
      ];

      const tablist = document.querySelector(".tabs");
      const stage = document.querySelector(".stage");
      const tabEls = [];
      const frameEls = [];

      TABS.forEach((t, i) => {
        const tab = document.createElement("button");
        tab.className = "tab";
        tab.type = "button";
        tab.setAttribute("role", "tab");
        tab.id = "tab-" + t.hash;
        tab.setAttribute("aria-controls", "panel-" + t.hash);
        tab.innerHTML =
          '<span class="t-label"></span><span class="t-sub"></span>';
        tab.querySelector(".t-label").textContent = t.label;
        tab.querySelector(".t-sub").textContent = t.sub;
        tab.addEventListener("click", () => select(i, true));
        tab.addEventListener("keydown", (e) => onKey(e, i));
        tablist.appendChild(tab);
        tabEls.push(tab);

        const frame = document.createElement("iframe");
        frame.id = "panel-" + t.hash;
        frame.title = t.label + " 문서";
        frame.dataset.src = t.file;
        frame.hidden = true;
        stage.appendChild(frame);
        frameEls.push(frame);
      });

      function indexFromHash() {
        const h = (location.hash || "").replace(/^#/, "");
        const i = TABS.findIndex((t) => t.hash === h);
        return i === -1 ? 0 : i;
      }

      function select(i, updateHash) {
        TABS.forEach((t, j) => {
          const active = j === i;
          tabEls[j].setAttribute("aria-selected", active ? "true" : "false");
          tabEls[j].tabIndex = active ? 0 : -1;
          const frame = frameEls[j];
          if (active && !frame.src) frame.src = frame.dataset.src; // lazy mount
          frame.hidden = !active;
        });
        if (updateHash && location.hash !== "#" + TABS[i].hash) {
          history.replaceState(null, "", "#" + TABS[i].hash);
        }
      }

      function onKey(e, i) {
        let next = null;
        if (e.key === "ArrowRight") next = (i + 1) % TABS.length;
        else if (e.key === "ArrowLeft")
          next = (i - 1 + TABS.length) % TABS.length;
        else if (e.key === "Home") next = 0;
        else if (e.key === "End") next = TABS.length - 1;
        if (next === null) return;
        e.preventDefault();
        select(next, true);
        tabEls[next].focus();
      }

      window.addEventListener("hashchange", () => select(indexFromHash(), false));
      select(indexFromHash(), true);
    </script>
  </body>
</html>
